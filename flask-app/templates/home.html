<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Weather Data</title>
</head>
<body>
<h1>Weather Data API</h1>
<p>URL format: http://127.0.0.1:5000/api/v1/station/date</p>
<p>Eg: http://127.0.0.1:5000/api/v1/10/1988-10-25</p>
<p>Eg for single station data: http://127.0.0.1:5000/api/v1/10/</p>
<p>Eg for yearly station data: http://127.0.0.1:5000/api/v1/yearly/10/1998</p>
<h2>Station Details</h2>
<p>{{data|safe}}</p>
</body>
</html>
